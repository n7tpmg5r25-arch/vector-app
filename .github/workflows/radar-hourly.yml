name: Hourly Session Sync (Radar high-velocity)

# WHY THIS EXISTS (Thread R6 follow-up, built 2026-06-01)
# -----------------------------------------------------------------------------
# nightly-sync (year-round, daily) + midday-sync (session weekdays, noon) give
# Radar a 12–24h detection latency. During an ACTIVE session bills move multiple
# times a day, so this job runs the same sync→detect→email pipeline HOURLY while
# the legislature is in session, dropping Radar latency to <=1h. Outside the
# Jan–Apr session windows it is fully DORMANT — the session_check date-gate skips
# every step, so nightly-sync remains the sole daily driver in the interim.
#
# Cadence is intentionally up for review: a Dec 1, 2026 reminder asks Colin to
# confirm "hourly vs twice-daily" + budget + repo-visibility BEFORE the 2027
# session starts. Until 2027-01-11 this workflow never does real work, so it is
# safe to land now. To dial cost down, narrow the cron hours below (e.g. daytime
# Pacific only) rather than the date-gate.
#
# Cost note: GitHub Actions minutes only. On a PRIVATE repo, 24/7 hourly across a
# ~165-day biennium of session days runs into paid overage (~$40–60/biennium at
# $0.008/min) — comfortably inside Colin's $200/yr ceiling. On a PUBLIC repo it
# is free. No new paid service; WA Leg API + Supabase + Resend stay on free tiers
# (Resend volume is bounded by Radar's per-term daily_cap + dedup ledger).
# -----------------------------------------------------------------------------

on:
  schedule:
    # Every hour, on the hour. The session_check step below gates real work to
    # the active Jan–Apr session windows; outside them every step is skipped.
    - cron: '0 * * * *'
  workflow_dispatch:  # Manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if session is active
        id: session_check
        run: |
          # Active ONLY during the two Jan–Apr session windows of the 2027-2028
          # biennium. Dates per app/lib/session-config.js (2027 long-session sine
          # die + 2028 cutoffs are WA-Leg estimates until the official calendars
          # publish; refine here when they do). Anything outside these windows —
          # including the May–Dec 2027 intra-biennium interim — skips entirely.
          TODAY=$(date -u +%Y-%m-%d)

          if [[ "$TODAY" >= "2027-01-11" && "$TODAY" <= "2027-04-30" ]]; then
            echo "In 2027 long session. Running hourly sync."
            echo "active=true" >> $GITHUB_OUTPUT
            echo "biennium=2027-28" >> $GITHUB_OUTPUT
            echo "year=2027" >> $GITHUB_OUTPUT
            echo "session_start=2027-01-11" >> $GITHUB_OUTPUT
            echo "committee_cutoff=2027-02-19" >> $GITHUB_OUTPUT
            echo "floor_cutoff=2027-03-10" >> $GITHUB_OUTPUT
            echo "opposite_cutoff=2027-03-31" >> $GITHUB_OUTPUT
            echo "sine_die=2027-04-25" >> $GITHUB_OUTPUT
          elif [[ "$TODAY" >= "2028-01-10" && "$TODAY" <= "2028-03-10" ]]; then
            echo "In 2028 short session. Running hourly sync."
            echo "active=true" >> $GITHUB_OUTPUT
            echo "biennium=2027-28" >> $GITHUB_OUTPUT
            echo "year=2028" >> $GITHUB_OUTPUT
            echo "session_start=2028-01-10" >> $GITHUB_OUTPUT
            echo "committee_cutoff=2028-02-07" >> $GITHUB_OUTPUT
            echo "floor_cutoff=2028-02-21" >> $GITHUB_OUTPUT
            echo "opposite_cutoff=2028-03-05" >> $GITHUB_OUTPUT
            echo "sine_die=2028-03-10" >> $GITHUB_OUTPUT
          else
            echo "Not in an active session window ($TODAY). Skipping hourly sync."
            echo "active=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.session_check.outputs.active == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        if: steps.session_check.outputs.active == 'true'
        run: npm ci

      - name: Install app dependencies
        if: steps.session_check.outputs.active == 'true'
        working-directory: ./app
        run: npm ci

      - name: Run sync
        if: steps.session_check.outputs.active == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CURRENT_BIENNIUM: ${{ steps.session_check.outputs.biennium }}
          CURRENT_YEAR: ${{ steps.session_check.outputs.year }}
          WA_API_BASE: 'https://wslwebservices.leg.wa.gov'
          SESSION_START: ${{ steps.session_check.outputs.session_start }}
          COMMITTEE_CUTOFF: ${{ steps.session_check.outputs.committee_cutoff }}
          FLOOR_CUTOFF: ${{ steps.session_check.outputs.floor_cutoff }}
          OPPOSITE_CUTOFF: ${{ steps.session_check.outputs.opposite_cutoff }}
          SINE_DIE: ${{ steps.session_check.outputs.sine_die }}
        run: node app/lib/sync-v2.js

      - name: Run alert detection
        if: steps.session_check.outputs.active == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node app/lib/detect-alerts.js

      # Radar detection: new-bill + material-change + new-language + fulltext
      # passes (Threads R2/R4/R6). Runs after alert detection and before
      # send-alerts so radar_match events ride the same hourly email pass.
      # NOTE: bill-text ingestion (sync-bill-text.js) stays nightly-only by
      # design (R5) — it is deliberately NOT run hourly to bound WA doc-service
      # volume. Hourly Radar still re-evaluates already-archived text every run.
      - name: Run radar detection
        if: steps.session_check.outputs.active == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node app/lib/detect-radar.js

      - name: Send alert emails (if events pending)
        if: steps.session_check.outputs.active == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          FUNCTION_SECRET: ${{ secrets.FUNCTION_SECRET }}
        run: |
          echo "Checking for pending alert events..."
          RESULT=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/functions/v1/send-alerts" \
            -H "Content-Type: application/json" \
            -H "x-function-secret: ${FUNCTION_SECRET}" \
            -d '{"type": "event-batch"}')
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -n -1)
          echo "send-alerts: HTTP $HTTP_CODE — $BODY"

      - name: Report result
        if: always()
        run: |
          if [ "${{ steps.session_check.outputs.active }}" == "true" ]; then
            echo "Hourly session sync completed at $(date -u)"
          else
            echo "Skipped — outside active session window"
          fi
