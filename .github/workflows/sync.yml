name: Vector Nightly Sync

on:
  schedule:
    - cron: '0 9 * * *'  # 2am Pacific (UTC-7)
  workflow_dispatch:      # allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WA_API_BASE: ${{ secrets.WA_API_BASE }}
          CURRENT_BIENNIUM: ${{ secrets.CURRENT_BIENNIUM }}
          CURRENT_YEAR: ${{ secrets.CURRENT_YEAR }}
          SESSION_START: ${{ secrets.SESSION_START }}
          COMMITTEE_CUTOFF: ${{ secrets.COMMITTEE_CUTOFF }}
          FLOOR_CUTOFF: ${{ secrets.FLOOR_CUTOFF }}
          OPPOSITE_CUTOFF: ${{ secrets.OPPOSITE_CUTOFF }}
          SINE_DIE: ${{ secrets.SINE_DIE }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node lib/sync.js
